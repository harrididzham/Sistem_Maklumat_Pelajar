<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Log Masuk</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="form-container">

<h2>Log Masuk</h2>

<form id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="Email">

<input
type="password"
id="loginPassword"
placeholder="Password">

<button type="submit">
Log Masuk
</button>

</form>

<p id="loginMessage"></p>

</div>

<script src="login.js"></script>

</body>
</html>
