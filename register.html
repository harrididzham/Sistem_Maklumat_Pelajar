<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Akaun</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

<h2>Daftar Akaun</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Nama Penuh">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Sahkan Password">

<button type="submit">
Daftar
</button>

</form>

<p id="registerMessage"></p>

</div>

<script src="register.js"></script>

</body>
</html>
